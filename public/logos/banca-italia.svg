<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Banca d'Italia - Autorizzazione n. 5003488">
  <title>Banca d'Italia</title>
  <rect x="4" y="4" width="192" height="192" fill="none" stroke="#1e3a5f" stroke-width="2"/>
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <g fill="#1e3a5f">
    <!-- Ornamental crown circle -->
    <circle cx="100" cy="62" r="34" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="100" cy="62" r="28" fill="none" stroke="#1e3a5f" stroke-width="0.8"/>
    <!-- BI monogram -->
    <text x="100" y="74" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="34" text-anchor="middle">BI</text>
    <!-- Laurel strokes (decorative) -->
    <path d="M42 55 Q34 70 42 92" fill="none" stroke="#1e3a5f" stroke-width="1.2"/>
    <path d="M48 50 Q42 70 50 95" fill="none" stroke="#1e3a5f" stroke-width="0.8"/>
    <path d="M158 55 Q166 70 158 92" fill="none" stroke="#1e3a5f" stroke-width="1.2"/>
    <path d="M152 50 Q158 70 150 95" fill="none" stroke="#1e3a5f" stroke-width="0.8"/>
    <!-- Lower ornament line -->
    <line x1="30" y1="115" x2="170" y2="115" stroke="#1e3a5f" stroke-width="0.8"/>
    <text x="100" y="138" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="16" text-anchor="middle" letter-spacing="1.5">BANCA D'ITALIA</text>
    <line x1="40" y1="148" x2="160" y2="148" stroke="#1e3a5f" stroke-width="0.5"/>
  </g>
  <rect x="15" y="165" width="170" height="22" fill="#fef3c7" stroke="#d4af37" stroke-width="0.6"/>
  <text x="100" y="181" font-family="Georgia, serif" font-weight="700" font-size="11" text-anchor="middle" fill="#1e3a5f">Aut. n. 5003488</text>
